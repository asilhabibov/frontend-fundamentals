<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <h1>Form</h1>
    </header>
    <main>
        <form action="" method="post" enctype="multipart/form-data" id="form1">
            <fieldset>
                <legend>Log in</legend>
                <label for="name">Name</label><br>
                <input type="text" id="name" name="name" placeholder="Name" autocomplete="off" required><br>
                <label for="lastname">Last Name</label><br>
                <input type="text" id="lastname" name="lastname" placeholder="lastname" required formaction="a.html"><br>
                <label for="username">Username</label><br>
                <input type="text" id="username" name="username" placeholder="user_name" autocomplete="off" required><br>
                <label for="password">Password</label><br>
                <input type="password" id="password" name="password" required minlength="8"><br>
                <label for="email">E-Mail</label><br>
                <input type="email" id="email" name="email" placeholder="example@example.com" required><br>
            </fieldset><br>
            <label for="phone">Phone Number</label><br>
            <input type="tel" id="phone" name="phone" placeholder="+994555555555" required><br>
            <label for="dob">Date of Birth </label><br>
            <input type="date" id="dob" name="dob" required><br>
            <label for="age">Age</label><br>
            <input type="number" id="age" name="age" min="18" max="30" required><br>
            <label>Gender</label><br>
            <label>
                <input type="radio" name="gender" value="male"> Male
            </label>
            <label>
                <input type="radio" name="gender" value="female"> Female
            </label><br>
            <label for="file">Resume</label><br>
            <input type="file" id="file" name="resume" accept="application/pdf" required><br> <br>
            <label for="language">Which languages do you want learn</label> <br>
            <input list="languages" id="language" name="language" required>
            <datalist id="languages">
                <option value="HTML">
                <option value="CSS">
                <option value="JavaScript">
            </datalist> <br> <br>
            <label>
                <input type="checkbox" name="terms" required> I agree to the terms and conditions
            </label> <br>
            <input type="hidden" name="test" value="test"> <br>
            <button type="reset">Reset</button>
            <button type="submit">Register</button>
            <button type="submit" formenctype="multipart/form-data" formmethod="get" formtarget="_blank">Register2</button>
        </form>
        <label for="country">country</label>
        <input type="text" id="country" name="country" placeholder="Germany" required form="form1"> <br>
        <label for="programminglanguages">Which language do you chosee?</label> <br>
        <Select id="programminglanguages" name="programminglanguages" required form="form1">
            <optgroup label="Front-end languages">
                <option value="HTML">HTML</option>
                <option value="CSS">CSS</option>
                <option value="JavaScript">JavaScript</option>
            </optgroup>
            <optgroup label="Backend-end languages">
                <option value="PHP">PHP</option>
                <option value="JavaScript">JavaScript</option>
                <option value="Python">Python</option>
            </optgroup>
        </Select><br> <br>
        <label for="about">Information about yourself</label><br>
        <textarea name="aboutyourself" id="about" cols="180" rows="20" minlength="300" form="form1"></textarea><br>
        <input type="range" min="5" max="35" step="5">
    </main>
</body>
</html>
